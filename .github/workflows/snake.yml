# ── Snake Animation Workflow ───────────────────────────────────────────────────
# Place this file at: .github/workflows/snake.yml
# in your profile repo: github.com/guptaraghav81/guptaraghav81
#
# After adding this file:
#   1. Go to your repo → Settings → Actions → General
#   2. Under "Workflow permissions" → select "Read and write permissions" → Save
#   3. Go to Actions tab → click "Generate Snake" → click "Run workflow"
#   4. The snake SVG will appear in the `output` branch automatically.
# ──────────────────────────────────────────────────────────────────────────────

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Lets you trigger it manually from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
